version: "3.8"

services:
  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: pcdc_chromadb
    ports:
      - "${CHROMA_PORT:-8100}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

volumes:
  chroma_data:
